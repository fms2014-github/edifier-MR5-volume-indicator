[Rainmeter]
Update=1000
AccurateText=1
DynamicWindowSize=1

[Variables]
; 파이썬에서 덮어씌워 줄 기본 변수들
MR5Volume=--
MR5Status=대기 중

; ========================================
; 파이썬 백그라운드 실행을 위한 플러그인 설정
; ========================================
[MeasureRunPython]
Measure=Plugin
Plugin=RunCommand
Parameter=python "#@#mr5_service.py"
State=Hide
OutputType=ANSI

; 💡 [여기가 새로 추가된 부분입니다!]
; 까만 CMD 창을 띄우지 않고 조용히 stop.txt 파일을 생성합니다.
[MeasureKillPython]
Measure=Plugin
Plugin=RunCommand
Parameter=cmd.exe /c echo stop > "#@#stop.txt"
State=Hide

; ========================================
; UI 디자인 (미터)
; ========================================
[MeterBackground]
Meter=Shape
Shape=Rectangle 0,0,220,110,10 | Fill Color 20,20,20,220 | StrokeWidth 1 | Stroke Color 50,50,50,255

[MeterTitle]
Meter=String
X=110
Y=15
StringAlign=Center
FontColor=255,255,255,150
FontFace=Malgun Gothic
FontSize=10
Text=Edifier MR5 (#MR5Status#)
DynamicVariables=1

[MeterVolume]
Meter=String
X=110
Y=40
StringAlign=Center
FontColor=255,255,255,255
FontFace=Malgun Gothic
FontSize=24
StringStyle=Bold
Text=#MR5Volume#
DynamicVariables=1

[MeterConnectButton]
Meter=String
X=40
Y=80
FontColor=100,255,100,255
FontFace=Malgun Gothic
FontSize=10
StringStyle=Bold
Text=[ 연결 ]
SolidColor=0,0,0,1
LeftMouseUpAction=[!CommandMeasure MeasureRunPython "Run"]
Cursor=Hand

[MeterDisconnectButton]
Meter=String
X=180
Y=80
StringAlign=Right
FontColor=255,100,100,255
FontFace=Malgun Gothic
FontSize=10
StringStyle=Bold
Text=[ 해제 ]
SolidColor=0,0,0,1
; 💡 [수정됨] 강제 Kill 대신, 조용히 stop.txt를 만드는 플러그인을 실행합니다.
LeftMouseUpAction=[!CommandMeasure MeasureKillPython "Run"][!SetVariable MR5Status "연결 해제됨"][!SetVariable MR5Volume "--"][!Update]
Cursor=Hand