[Rainmeter]
Update=1000
AccurateText=1
DynamicWindowSize=1

[Variables]
MR5Volume=--
MR5Status=대기 중

[MeasureRunPython]
Measure=Plugin
Plugin=RunCommand
Parameter=python "#@#mr5_service.py"
State=Hide
OutputType=ANSI

[MeasureKillPython]
Measure=Plugin
Plugin=RunCommand
Parameter=cmd.exe /c echo stop > "#@#stop.txt"
State=Hide

[MeterBackground]
Meter=Shape
; 💡 스킨 높이를 110에서 130으로 살짝 늘려서 에러 메시지 공간을 확보했습니다.
Shape=Rectangle 0,0,220,130,10 | Fill Color 20,20,20,220 | StrokeWidth 1 | Stroke Color 50,50,50,255

[MeterTitle]
Meter=String
X=110
Y=10
StringAlign=Center
FontColor=255,255,255,150
FontFace=Malgun Gothic
FontSize=10
Text=Edifier MR5

[MeterVolume]
Meter=String
X=110
Y=35
StringAlign=Center
FontColor=255,255,255,255
FontFace=Malgun Gothic
FontSize=24
StringStyle=Bold
Text=#MR5Volume#
DynamicVariables=1

; 💡 [새로 추가된 부분] 상태 및 에러 메시지를 눈에 띄게 보여주는 전용 텍스트입니다.
[MeterStatus]
Meter=String
X=110
Y=75
StringAlign=Center
FontColor=255,200,100,255
FontFace=Malgun Gothic
FontSize=9
Text=#MR5Status#
ClipString=1
W=200
DynamicVariables=1

[MeterConnectButton]
Meter=String
X=40
Y=100
FontColor=100,255,100,255
FontFace=Malgun Gothic
FontSize=10
StringStyle=Bold
Text=[ 연결 ]
SolidColor=0,0,0,1
LeftMouseUpAction=[!CommandMeasure MeasureRunPython "Run"]
Cursor=Hand

[MeterDisconnectButton]
Meter=String
X=180
Y=100
StringAlign=Right
FontColor=255,100,100,255
FontFace=Malgun Gothic
FontSize=10
StringStyle=Bold
Text=[ 해제 ]
SolidColor=0,0,0,1
LeftMouseUpAction=[!CommandMeasure MeasureKillPython "Run"][!SetVariable MR5Status "연결 해제됨"][!SetVariable MR5Volume "--"][!Update]
Cursor=Hand